<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <style>
    .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .sub { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .label { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
    .value { font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #111827; }
    .axis { stroke: #d1d5db; stroke-width: 1; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .yy { fill: #64748b; }
    .kk { fill: #16a34a; }
    .legend { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
  </style>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="40" y="48" class="title">TextView Benchmark - 100 Characters</text>
  <text x="40" y="74" class="sub">Unit: ms/op. Lower is better.</text>

  <rect x="710" y="38" width="14" height="14" rx="3" class="yy"/>
  <text x="730" y="50" class="legend">YYTextView</text>
  <rect x="820" y="38" width="14" height="14" rx="3" class="kk"/>
  <text x="840" y="50" class="legend">KKTextView</text>

  <line x1="300" y1="96" x2="300" y2="510" class="axis"/>
  <line x1="440" y1="96" x2="440" y2="510" class="grid"/>
  <line x1="580" y1="96" x2="580" y2="510" class="grid"/>
  <line x1="720" y1="96" x2="720" y2="510" class="grid"/>
  <line x1="860" y1="96" x2="860" y2="510" class="grid"/>
  <text x="296" y="530" text-anchor="middle" class="sub">0</text>
  <text x="440" y="530" text-anchor="middle" class="sub">0.2</text>
  <text x="580" y="530" text-anchor="middle" class="sub">0.4</text>
  <text x="720" y="530" text-anchor="middle" class="sub">0.6</text>
  <text x="860" y="530" text-anchor="middle" class="sub">0.8</text>

  <text x="40" y="124" class="label">set attributedText</text>
  <rect x="300" y="104" width="470" height="14" rx="4" class="yy"/>
  <rect x="300" y="124" width="372" height="14" rx="4" class="kk"/>
  <text x="782" y="116" class="value">YY 0.672</text>
  <text x="684" y="136" class="value">KK 0.532</text>

  <text x="40" y="180" class="label">insert beginning x30</text>
  <rect x="300" y="160" width="144" height="14" rx="4" class="yy"/>
  <rect x="300" y="180" width="170" height="14" rx="4" class="kk"/>
  <text x="456" y="172" class="value">YY 0.205</text>
  <text x="482" y="192" class="value">KK 0.243</text>

  <text x="40" y="236" class="label">insert middle x30</text>
  <rect x="300" y="216" width="98" height="14" rx="4" class="yy"/>
  <rect x="300" y="236" width="128" height="14" rx="4" class="kk"/>
  <text x="410" y="228" class="value">YY 0.140</text>
  <text x="440" y="248" class="value">KK 0.183</text>

  <text x="40" y="292" class="label">append x30</text>
  <rect x="300" y="272" width="94" height="14" rx="4" class="yy"/>
  <rect x="300" y="292" width="123" height="14" rx="4" class="kk"/>
  <text x="406" y="284" class="value">YY 0.134</text>
  <text x="435" y="304" class="value">KK 0.175</text>

  <text x="40" y="348" class="label">delete backward x30</text>
  <rect x="300" y="328" width="138" height="14" rx="4" class="yy"/>
  <rect x="300" y="348" width="4" height="14" rx="2" class="kk"/>
  <text x="450" y="340" class="value">YY 0.197</text>
  <text x="316" y="360" class="value">KK 0.005</text>

  <text x="40" y="404" class="label">selection x100</text>
  <rect x="300" y="384" width="39" height="14" rx="4" class="yy"/>
  <rect x="300" y="404" width="39" height="14" rx="4" class="kk"/>
  <text x="351" y="396" class="value">YY 0.056</text>
  <text x="351" y="416" class="value">KK 0.056</text>

  <text x="40" y="460" class="label">scrollRangeToVisible x80</text>
  <rect x="300" y="440" width="3" height="14" rx="2" class="yy"/>
  <rect x="300" y="460" width="3" height="14" rx="2" class="kk"/>
  <text x="315" y="452" class="value">YY 0.004</text>
  <text x="315" y="472" class="value">KK 0.004</text>
</svg>
